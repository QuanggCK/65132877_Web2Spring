<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-warning py-3">
                        <h5 class="m-0 fw-bold">CHỈNH SỬA BÀI VIẾT</h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/tintuc/save}" th:object="${tintuc}" method="post">
                            <input type="hidden" th:field="*{id_tin}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tiêu đề</label>
                                <input type="text" th:field="*{ten_tin}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Thể loại</label>
                                <select th:field="*{loaiTinTuc.idLoaiTinTuc}" class="form-select">
                                    <option th:each="l : ${dsLoai}" th:value="${l.idLoaiTinTuc}" th:text="${l.tenLoai}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Nội dung bài viết</label>
                                <textarea th:field="*{thong_tin}" class="form-control" rows="10" required></textarea>
                            </div>

                            <div class="d-flex justify-content-between">
                                <a href="/admin/tintuc" class="btn btn-outline-secondary">Quay lại</a>
                                <button type="submit" class="btn btn-warning fw-bold px-5">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
