<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #212529; color: white; position: sticky; top: 0; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background: #343a40; color: white; border-left: 4px solid #198754; }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0 sidebar shadow">
                <div class="p-4 text-center border-bottom border-secondary">
                    <h5 class="fw-bold m-0">MY ADMIN</h5>
                </div>
                <nav class="mt-3">
                    <a href="/admin/tintuc" class="active">📰 Quản lý Tin tức</a>
                    <a href="/home/tintuc" class="mt-5 text-info">🏠 Xem trang chủ</a>
                </nav>
            </div>

            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">Quản lý Tin Tức</h3>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addTinModal">+ Viết tin mới</button>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle m-0">
                            <thead class="table-dark">
                                <tr>
                                    <th class="ps-3">ID</th>
                                    <th>Tiêu đề</th>
                                    <th>Thể loại</th>
                                    <th>Nội dung tóm tắt</th>
                                    <th class="text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tt : ${dsTinTuc}">
                                    <td class="ps-3" th:text="${tt.id_tin}"></td>
                                    <td class="fw-bold" th:text="${tt.ten_tin}"></td>
                                    <td>
                                        <span class="badge bg-secondary" th:text="${tt.loaiTinTuc.tenLoai}"></span>
                                    </td>
                                    <td class="text-muted" th:text="${#strings.abbreviate(tt.thong_tin, 50)}"></td>
                                    <td class="text-center">
                                        <a th:href="@{'/admin/tintuc/edit/' + ${tt.id_tin}}" class="btn btn-warning btn-sm">Sửa</a>
                                        <a th:href="@{'/admin/tintuc/delete/' + ${tt.id_tin}}" 
                                           class="btn btn-danger btn-sm" onclick="return confirm('Xóa tin này?')">Xóa</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addTinModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <form th:action="@{/admin/tintuc/save}" method="post">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title">Thêm bài viết mới</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tiêu đề tin</label>
                            <input type="text" name="ten_tin" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Thể loại</label>
                            <select name="loaiTinTuc.idLoaiTinTuc" class="form-select">
                                <option th:each="l : ${dsLoai}" th:value="${l.idLoaiTinTuc}" th:text="${l.tenLoai}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nội dung chi tiết</label>
                            <textarea name="thong_tin" class="form-control" rows="6" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-success px-4">Đăng bài</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
