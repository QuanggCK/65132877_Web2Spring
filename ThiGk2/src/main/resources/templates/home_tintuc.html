<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tin Tức Mới Nhất</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="/home/tintuc">📰 PHAM QUANG NEWS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="btn btn-outline-light px-4" href="/login">Đăng nhập Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row align-items-center mb-4">
            <div class="col-md-8">
                <h2 class="fw-bold text-primary m-0">Tin Tức Mới Nhất</h2>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-primary text-white fw-bold">Danh mục</div>
                    <div class="list-group list-group-flush">
                        <a href="/home/tintuc" class="list-group-item list-group-item-action active">Tất cả bài viết</a>
                        <a th:each="l : ${dsLoai}" 
                           th:href="@{'/home/tintuc/loai/' + ${l.idLoaiTinTuc}}" 
                           class="list-group-item list-group-item-action" 
                           th:text="${l.tenLoai}"></a>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div th:if="${#lists.isEmpty(dsTinTuc)}" class="alert alert-warning">
                    Hiện chưa có bài viết nào trong danh mục này.
                </div>

                <div th:each="tt : ${dsTinTuc}" class="card mb-4 border-0 shadow-sm">
                    <div class="card-body p-4">
                        <span class="badge bg-info text-dark mb-2" th:text="${tt.loaiTinTuc.tenLoai}"></span>
                        <h3 class="card-title fw-bold" th:text="${tt.ten_tin}"></h3>
                        <p class="card-text text-muted">
                            <span th:text="${#strings.abbreviate(tt.thong_tin, 180)}"></span>
                        </p>
                        <a th:href="@{'/home/tintuc/detail/' + ${tt.id_tin}}" class="btn btn-primary btn-sm px-3">Đọc tiếp...</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
