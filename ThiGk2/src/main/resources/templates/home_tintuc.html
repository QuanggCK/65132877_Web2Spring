<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tin Tức Mới Nhất</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4 fw-bold text-primary">Tin Tức Mới Nhất</h2>
        <hr>
        <div class="row">
            <div class="col-md-3">
                <div class="list-group">
                    <a href="/home/tintuc" class="list-group-item list-group-item-action active">Tất cả bài viết</a>
                    <a th:each="l : ${dsLoai}" 
                       th:href="@{'/home/tintuc/loai/' + ${l.idLoaiTinTuc}}" 
                       class="list-group-item list-group-item-action" 
                       th:text="${l.tenLoai}"></a>
                </div>
            </div>

            <div class="col-md-9">
                <div th:each="tt : ${dsTinTuc}" class="card mb-3 border-0 shadow-sm">
                    <div class="card-body">
                        <span class="badge bg-info text-dark mb-2" th:text="${tt.loaiTinTuc.tenLoai}"></span>
                        <h4 class="card-title fw-bold" th:text="${tt.ten_tin}"></h4>
                        <p class="card-text text-muted" th:text="${#strings.abbreviate(tt.thong_tin, 150)}"></p>
                        <a th:href="@{'/home/tintuc/detail/' + ${tt.id_tin}}" class="btn btn-outline-primary btn-sm">Đọc tiếp...</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
