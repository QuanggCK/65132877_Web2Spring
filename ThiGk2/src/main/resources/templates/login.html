<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            background: #fff;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            background: #212529;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-header h2 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .login-body {
            padding: 40px 30px;
        }
        .btn-login {
            background: #198754;
            border: none;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #157347;
            transform: translateY(-2px);
        }
        .error-msg {
            font-size: 0.9rem;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h2>MY ADMIN</h2>
            <p class="text-secondary mb-0 small">Vui lòng đăng nhập để tiếp tục</p>
        </div>
        
        <div class="login-body">
            <div th:if="${msg}" class="alert alert-danger error-msg text-center mb-4" role="alert">
                <span th:text="${msg}">Tài khoản hoặc mật khẩu sai!</span>
            </div>

            <form th:action="@{/handle-login}" method="post">
                <div class="mb-4">
                    <label for="user" class="form-label fw-bold">Tên đăng nhập</label>
                    <input type="text" 
                           class="form-control form-control-lg" 
                           id="user" 
                           name="user" 
                           placeholder="Nhập username..." 
                           required>
                </div>
                
                <div class="mb-4">
                    <label for="pass" class="form-label fw-bold">Mật khẩu</label>
                    <input type="password" 
                           class="form-control form-control-lg" 
                           id="pass" 
                           name="pass" 
                           placeholder="Nhập password..." 
                           required>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-login btn-lg text-white">ĐĂNG NHẬP</button>
                </div>

                <div class="text-center mt-3">
                    <a href="/home/tintuc" class="text-muted text-decoration-none small">← Quay lại trang chủ</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
