<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <div class="container bg-white shadow-sm p-4 rounded">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>⚙️ Quản lý sản phẩm</h3>
            <a href="/admin/add" class="btn btn-success">Thêm sản phẩm mới</a>
        </div>

        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Hình ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Mô tả</th>
                    <th>Loại</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="sp : ${danhSachSP}">
                    <td th:text="${sp.idLoaiSp}">1</td>
                    <td><img th:src="${sp.img}" width="60" class="rounded"></td>
                    <td th:text="${sp.tenLoaiSp}">Tên</td>
                    <td th:text="${sp.description}">Mô tả</td>
                    <td th:text="${sp.loaiSanPham?.tenLoai}">Loại</td>
                    <td>
                        <a th:href="@{/admin/edit/{id}(id=${sp.idLoaiSp})}" class="text-dark text-decoration-none me-3">Sửa</a>
                        
                        <a th:href="@{/admin/delete/{id}(id=${sp.idLoaiSp})}" class="text-dark text-decoration-none" 
                           onclick="return confirm('Bạn chắc chắn muốn xóa?')">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
