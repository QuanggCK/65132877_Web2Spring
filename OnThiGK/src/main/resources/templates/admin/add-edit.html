<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 bg-white p-4 shadow-sm rounded">
                <h3 class="mb-4" th:text="${sanpham.idLoaiSp == null ? 'Thêm sản phẩm' : 'Sửa sản phẩm'}"></h3>
                
                <form th:action="@{/admin/save}" th:object="${sanpham}" method="post">
                    <input type="hidden" th:field="*{idLoaiSp}">

                    <div class="mb-3">
                        <label class="form-label">Tên sản phẩm</label>
                        <input type="text" th:field="*{tenLoaiSp}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mô tả</label>
                        <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Link ảnh (URL)</label>
                        <input type="text" th:field="*{img}" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Loại sản phẩm</label>
                        <select th:field="*{loaiSanPham}" class="form-select">
                            <option th:each="l : ${danhSachLoai}" 
                                    th:value="${l.idLoai}" 
                                    th:text="${l.tenLoai}"></option>
                        </select>
                    </div>

                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Lưu lại</button>
                        <a href="/admin" class="btn btn-secondary text-white ms-2">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
