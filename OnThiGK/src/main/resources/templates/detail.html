<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-img {
            max-height: 500px;
            object-fit: contain;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🏠 My Store</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light btn-sm me-2">Quay lại cửa hàng</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm border-0" th:if="${sp != null}">
            <div class="row g-0">
                <div class="col-md-6 bg-white d-flex align-items-center justify-content-center p-4">
                    <img th:src="@{'/images/' + ${sp.img}}" class="img-fluid product-img" alt="Hình ảnh sản phẩm">
                </div>

                <div class="col-md-6 p-5">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="/" class="text-decoration-none">Sản phẩm</a></li>
                            <li class="breadcrumb-item active" 
                                th:text="${sp.loaiSanPham != null ? sp.loaiSanPham.tenLoai : 'Chưa phân loại'}">Loại</li>
                        </ol>
                    </nav>

                    <h1 class="display-5 fw-bold mb-3" th:text="${sp.tenLoaiSp}">Tên sản phẩm</h1>
                    
                    <div class="mb-4">
                        <span class="badge bg-primary px-3 py-2 fs-6">
                            Mã SP: <span th:text="${sp.idLoaiSp}"></span>
                        </span>
                    </div>

                    <h4 class="text-secondary border-bottom pb-2">Mô tả sản phẩm</h4>
                    <p class="lead text-muted mt-3" style="white-space: pre-line;" th:text="${sp.description}">
                        Nội dung mô tả chi tiết sản phẩm sẽ hiển thị ở đây...
                    </p>

                    <div class="mt-5 d-grid gap-2">
                        <button class="btn btn-dark btn-lg">Thêm vào giỏ hàng</button>
                        <a href="/" class="btn btn-outline-secondary">Tiếp tục mua sắm</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:unless="${sp != null}" class="alert alert-danger">
            Sản phẩm không tồn tại hoặc đã bị xóa!
        </div>
    </div>

    <footer class="mt-5 py-4 text-center text-muted">
        <p>© 2026 Pham Minh Quang</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
