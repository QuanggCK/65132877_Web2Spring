<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow border-0 mx-auto" style="max-width: 600px;">
            <div class="card-body p-5">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h1 class="display-6 fw-bold" th:text="${page.tenSpham}"></h1>
                        <p class="badge bg-info text-dark" th:text="${page.loaiSanPham.ten_loai}"></p>
                    </div>
                    <h3 class="text-danger fw-bold" th:text="${page.gia + ' VNĐ'}"></h3>
                </div>
                <hr>
                <h5 class="fw-bold">Mô tả sản phẩm:</h5>
                <p class="lead" th:text="${page.description}"></p>
                <div class="mt-5 border-top pt-3 text-end">
                    <a href="/home" class="btn btn-secondary">Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
