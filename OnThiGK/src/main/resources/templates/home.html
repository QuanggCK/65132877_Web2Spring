<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home - My Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; border-right: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 bg-white sidebar p-3">
                <h4 class="fw-bold text-primary border-bottom pb-2">DASHBOARD</h4>
                <div class="list-group list-group-flush mt-4">
                    <a href="/home" class="list-group-item list-group-item-action active">Home</a>
                    <a href="/admin" class="list-group-item list-group-item-action">Go to Admin</a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10 bg-light p-4">
                <h2 class="mb-4">Danh sách sản phẩm</h2>
                <div class="row row-cols-1 row-cols-md-3 g-4">
                    <div class="col" th:each="sp : ${dsSanPham}">
                        <div class="card h-100 shadow-sm border-0">
                            <div class="card-body">
                                <h5 class="card-title fw-bold text-uppercase" th:text="${sp.tenSpham}">Tên SP</h5>
                                <p class="badge bg-secondary mb-2" th:text="${sp.loaiSanPham.ten_loai}"></p>
                                <p class="card-text text-muted small text-truncate" th:text="${sp.description}">Mô tả</p>
                                <h5 class="text-danger fw-bold" th:text="${sp.gia + ' VNĐ'}"></h5>
                                <a th:href="@{'/home/' + ${sp.idSanPham}}" class="btn btn-outline-dark btn-sm w-100 mt-2">Chi tiết</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
