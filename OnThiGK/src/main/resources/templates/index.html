<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cửa Hàng Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">My Store</a>
            <a href="/admin" class="btn btn-outline-light btn-sm">Trang Quản Trị</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Danh sách sản phẩm</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="sp : ${danhSachSP}">
                <div class="card h-100 shadow-sm">
                    <img th:src="${sp.img}" class="card-img-top" alt="..." style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${sp.tenLoaiSp}">Tên sản phẩm</h5>
                        <span class="badge bg-info text-dark" 
                              th:text="${sp.loaiSanPham != null ? sp.loaiSanPham.tenLoai : 'Chưa phân loại'}">Loại</span>
                              <a th:href="@{/san-pham/{id}(id=${sp.idLoaiSp})}" class="btn btn-sm btn-outline-primary">
        Xem chi tiết
    </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
