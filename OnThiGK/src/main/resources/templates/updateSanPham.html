<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-header bg-warning fw-bold">CHỈNH SỬA THÔNG TIN</div>
        <div class="card-body">
            <form th:action="@{/admin/save}" th:object="${sanpham}" method="post">
                <input type="hidden" th:field="*{idSanPham}">
                <div class="mb-3">
                    <label class="form-label">Tên sản phẩm</label>
                    <input type="text" th:field="*{tenSpham}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Giá tiền</label>
                    <input type="text" th:field="*{gia}" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mô tả</label>
                    <textarea th:field="*{description}" class="form-control"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Loại sản phẩm</label>
                    <select th:field="*{loaiSanPham.id_loai}" class="form-select">
                        <option th:each="l : ${dsLoaiSP}" th:value="${l.id_loai}" th:text="${l.ten_loai}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Cập nhật</button>
                <a href="/admin" class="btn btn-link w-100 mt-2 text-secondary">Hủy bỏ</a>
            </form>
        </div>
    </div>
</body>
</html>
