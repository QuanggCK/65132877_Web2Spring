<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #212529; color: white; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 12px 20px; }
        .sidebar a:hover, .sidebar a.active { background: #343a40; color: white; border-left: 4px solid #0d6efd; }
    </style>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 p-0 sidebar shadow">
                <div class="p-4 text-center">
                    <h5 class="fw-bold m-0 text-white">MY ADMIN</h5>
                </div>
                <nav class="mt-3">
                    <a href="/home">🏠 Trang chủ Store</a>
                    <a href="/admin" class="active">📦 Quản lý Sản phẩm</a>
                </nav>
            </div>

            <div class="col-md-9 col-lg-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold">Danh sách Sản phẩm</h3>
                    <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addModal">+ Thêm Sản Phẩm</button>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle m-0">
                            <thead class="table-dark">
                                <tr>
                                    <th class="ps-3">ID</th>
                                    <th>Tên SP</th>
                                    <th>Giá (VNĐ)</th>
                                    <th>Loại</th>
                                    <th class="text-center">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="sp : ${dsSanPham}">
                                    <td class="ps-3" th:text="${sp.idSanPham}"></td>
                                    <td class="fw-bold" th:text="${sp.tenSpham}"></td>
                                    <td class="text-danger fw-bold" th:text="${sp.gia}"></td>
                                    <td><span class="badge bg-info text-dark" th:text="${sp.loaiSanPham.ten_loai}"></span></td>
                                    <td class="text-center">
                                        <a th:href="@{'/admin/edit/' + ${sp.idSanPham}}" class="btn btn-warning btn-sm px-3">Sửa</a>
                                        <a th:href="@{'/admin/delete/' + ${sp.idSanPham}}" class="btn btn-danger btn-sm px-3" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/save}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Thêm Sản Phẩm Mới</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Tên sản phẩm</label>
                            <input type="text" name="tenSpham" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Giá tiền</label>
                            <input type="text" name="gia" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Loại sản phẩm</label>
                            <select name="loaiSanPham.id_loai" class="form-select">
                                <option th:each="l : ${dsLoaiSanPham}" th:value="${l.id_loai}" th:text="${l.ten_loai}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-primary">Lưu sản phẩm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
