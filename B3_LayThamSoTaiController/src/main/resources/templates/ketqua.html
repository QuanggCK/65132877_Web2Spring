<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kết Quả</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; padding-top: 50px; }
        .result-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #d35400; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px;}
        p { font-size: 16px; line-height: 1.6; color: #2c3e50;}
        .highlight { font-weight: bold; color: #2980b9; }
        a.btn { display: block; text-align: center; margin-top: 20px; padding: 10px; background-color: #7f8c8d; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;}
        a.btn:hover { background-color: #95a5a6; }
    </style>
</head>
<body>

    <div class="result-box">
        <h2>Thông Tin Đã Nhận</h2>
        
        <p><center>Tên <span class="highlight" th:text="${tenHS}"></span>!</center></p>
        <p><center>Năm sinh: <span class="highlight" th:text="${namSinhHS}"></span></center></p>
        <p><center>Lớp: <span class="highlight" th:text="${lopHS}"></span></center></p>
        <p><center>Trường: <span class="highlight" th:text="${truongHS}"></span></center></p>
        
        <a href="/bai3" class="btn">Quay lại Form nhập</a>
    </div>

</body>
</html>
