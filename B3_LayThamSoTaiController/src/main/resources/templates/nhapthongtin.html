<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nhập Thông Tin Học Sinh</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; padding-top: 50px; }
        .form-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #2c3e50; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #34495e; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #bdc3c7; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #27ae60; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #2ecc71; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Nhập Thông Tin</h2>
        
        <form action="/xuly" method="POST">
            
            <div class="input-group">
                <label>Họ và Tên:</label>
                <input type="text" name="HT" required placeholder="Nhập tên của bạn">
            </div>
            
            <div class="input-group">
                <label>Năm sinh:</label>
                <input type="number" name="NS" required placeholder="Nhập năm sinh">
            </div>
            
            <div class="input-group">
                <label>Lớp:</label>
                <input type="text" name="Ma" required placeholder="Nhập lớp đang học">
            </div>
            
            <div class="input-group">
                <label>Trường:</label>
                <input type="text" name="GT" required placeholder="Nhập tên trường">
            </div>
            
            <button type="submit">Gửi Dữ Liệu</button>
        </form>
    </div>

</body>
</html>
