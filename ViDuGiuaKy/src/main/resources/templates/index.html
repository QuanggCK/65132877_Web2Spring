<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CV Sinh Viên</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-rows: 60px 1fr 40px;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        /* Phần Header */
        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding: 0 20px;
        }

        .logo {
            color: #d32f2f;
            font-weight: bold;
            font-size: 14px;
        }

        .logo span {
            color: #1976d2;
            font-size: 12px;
        }

        .user-info {
            font-size: 16px;
        }

        /* Phần Sidebar (Menu trái) */
        aside {
            grid-area: sidebar;
            border-right: 2px solid #333;
        }

        aside ul {
            list-style-type: none;
        }

        aside ul li {
            border-bottom: 1px solid #333;
            padding: 12px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        aside ul li.active {
            font-weight: bold;
        }

        /* Phần Nội dung chính (Content) */
        main {
            grid-area: content;
            background-color: #f5f5f5;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cv-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        .cv-card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .cv-card p {
            font-size: 18px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .cv-card strong {
            display: inline-block;
            width: 120px;
        }

        /* Phần Footer */
        footer {
            grid-area: footer;
            border-top: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span>TRƯỜNG ĐẠI HỌC NHA TRANG</span><br>
            KHOA CÔNG NGHỆ THÔNG TIN
        </div>
        <div class="user-info">
            [<span th:text="${ten}">UserName</span>]
        </div>
    </header>

    <aside>
        <ul>
            <li class="active">Dasdboard</li>
            <li>Page -List</li>
            <li>Page -Addnew</li>
            <li>Post -List</li>
            <li>Post -Addnew</li>
        </ul>
    </aside>

    <main>
        <div class="cv-card">
            <h2>THÔNG TIN SINH VIÊN</h2>
            <p><strong>MSSV:</strong> <span th:text="${ms}">...</span></p>
            <p><strong>Họ và tên:</strong> <span th:text="${ten}">...</span></p>
            <p><strong>Năm sinh:</strong> <span th:text="${nam}">...</span></p>
            <p><strong>Lớp:</strong> <span th:text="${lp}">...</span></p>
        </div>
    </main>

    <footer>
        &copy;2026 by <span th:text="${ten}"> Student Name</span> – FIT.NTU
    </footer>

</body>
</html>
