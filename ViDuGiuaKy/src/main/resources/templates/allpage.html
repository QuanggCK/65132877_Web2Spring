<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Page</title>
    <style>
        body { font-family: Arial, sans-serif; display: grid; grid-template-areas: "header header" "sidebar content" "footer footer"; grid-template-rows: 60px 1fr 40px; grid-template-columns: 250px 1fr; min-height: 100vh; margin: 0; }
        header { grid-area: header; border-bottom: 2px solid #333; padding: 0 20px; display: flex; align-items: center; }
        aside { grid-area: sidebar; border-right: 2px solid #333; padding: 15px; }
        main { grid-area: content; background-color: #f5f5f5; padding: 30px; }
        footer { grid-area: footer; border-top: 2px solid #333; display: flex; justify-content: center; align-items: center; }
        
        /* CSS cho Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        table, th, td { border: 1px solid black; }
        th, td { padding: 10px; text-align: left; }
        .btn-add { display: inline-block; padding: 8px 15px; background: #1976d2; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <header><h3>KHOA CÔNG NGHỆ THÔNG TIN</h3></header>
    <aside>
        <ul>
            <li>Dashboard</li>
            <li style="font-weight: bold;">Page - List</li>
            <li><a th:href="@{/page/new}">Page - Addnew</a></li>
        </ul>
    </aside>
    
    <main>
        <div style="background: white; padding: 20px; border-radius: 8px;">
            <h2>Danh sách các Page</h2>
            <a th:href="@{/page/new}" class="btn-add">+ Thêm mới Page</a>
            
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>Pagename</th>
                        <th>parentPageId</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${lstPages}">
                        <td th:text="${p.id}">001</td>
                        <td th:text="${p.pageName}">Tên trang</td>
                        <td th:text="${p.parentPageId}">000</td>
                        <td>
                            <a th:href="@{/page/view/{id}(id=${p.id})}">[view]</a> 
                            <a href="#">[edit]</a> 
                            <a th:href="@{/page/delete/{id}(id=${p.id})}" onclick="return confirm('Bạn có chắc muốn xóa không?');">[delete]</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <footer>&copy;2025 by Student Name – FIT.NTU</footer>
</body>
</html>
