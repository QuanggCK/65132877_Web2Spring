<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Post - CV Sinh Viên</title>
    <style>
        /* CSS Khung Layout chung */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif; display: grid;
            grid-template-areas: "header header" "sidebar content" "footer footer";
            grid-template-rows: 60px 1fr 40px; grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        /* Header */
        header {
            grid-area: header; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid #333; padding: 0 20px;
        }
        .logo { color: #d32f2f; font-weight: bold; font-size: 14px; }
        .logo span { color: #1976d2; font-size: 12px; }
        .user-info { font-size: 16px; }

        /* Sidebar */
        aside { grid-area: sidebar; border-right: 2px solid #333; }
        aside ul { list-style-type: none; }
        aside ul li { border-bottom: 1px solid #333; }
        aside ul li a {
            display: block; padding: 12px 15px; font-size: 16px;
            text-decoration: none; color: #333;
        }
        aside ul li a:hover { background-color: #eee; }
        aside ul li.active a { font-weight: bold; }

        /* Content & Details */
        main {
            grid-area: content; background-color: #f5f5f5; padding: 30px;
            display: flex; justify-content: center; align-items: flex-start;
        }
        .detail-box {
            background: white; padding: 30px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 550px;
            margin-top: 20px;
        }
        h2 { margin-bottom: 20px; color: #1976d2; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .detail-box p { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
        .detail-box strong { display: inline-block; width: 150px; color: #555; }
        
        .btn-back {
            display: block; text-align: center; margin-top: 25px; padding: 10px;
            background: #333; color: white; text-decoration: none; border-radius: 4px;
        }
        .btn-back:hover { background: #555; }

        /* Footer */
        footer {
            grid-area: footer; border-top: 2px solid #333; display: flex;
            justify-content: center; align-items: center; font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span>TRƯỜNG ĐẠI HỌC NHA TRANG</span><br>
            KHOA CÔNG NGHỆ THÔNG TIN
        </div>
        <div class="user-info">
            [<span th:text="${ten ?: 'UserName'}">UserName</span>]
        </div>
    </header>

    <aside>
        <ul>
            <li><a th:href="@{/}">Dasdboard</a></li>
            <li><a th:href="@{/page/all}">Page -List</a></li>
            <li><a th:href="@{/page/new}">Page -Addnew</a></li>
            <li class="active"><a th:href="@{/post/all}">Post -List</a></li>
            <li><a th:href="@{/post/new}">Post -Addnew</a></li>
        </ul>
    </aside>

    <main>
        <div class="detail-box">
            <h2>CHI TIẾT BÀI VIẾT (POST)</h2>
            
            <p><strong>Mã ID:</strong> <span th:text="${postDetail.id}">...</span></p>
            <p><strong>Tiêu đề:</strong> <span th:text="${postDetail.title}">...</span></p>
            <p><strong>Nội dung:</strong> <span th:text="${postDetail.content}">...</span></p>
            <p><strong>Mã chuyên mục:</strong> <span th:text="${postDetail.categoryId}">...</span></p>
            <p><strong>Hình thu nhỏ:</strong> <span th:text="${postDetail.thumbnailImage}">...</span></p>
            
            <a th:href="@{/post/all}" class="btn-back">Quay lại danh sách</a>
        </div>
    </main>

    <footer>
        &copy;2025 by <span th:text="${ten ?: 'Student Name'}">Student Name</span> – FIT.NTU
    </footer>

</body>
</html>
