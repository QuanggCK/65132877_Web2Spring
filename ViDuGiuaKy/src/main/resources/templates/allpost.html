<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Post - CV Sinh Viên</title>
    <style>
        /* CSS Khung Layout chung */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-rows: 60px 1fr 40px;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        /* Header */
        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding: 0 20px;
        }
        .logo { color: #d32f2f; font-weight: bold; font-size: 14px; }
        .logo span { color: #1976d2; font-size: 12px; }
        .user-info { font-size: 16px; }

        /* Sidebar */
        aside {
            grid-area: sidebar;
            border-right: 2px solid #333;
        }
        aside ul { list-style-type: none; }
        aside ul li {
            border-bottom: 1px solid #333;
        }
        aside ul li a {
            display: block;
            padding: 12px 15px;
            font-size: 16px;
            text-decoration: none;
            color: #333;
        }
        aside ul li a:hover { background-color: #eee; }
        aside ul li.active a { font-weight: bold; }

        /* Content */
        main {
            grid-area: content;
            background-color: #f5f5f5;
            padding: 30px;
        }
        .content-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 15px; color: #333; }

        /* Nút và Bảng (Table) */
        .btn-add {
            display: inline-block;
            padding: 8px 15px;
            background: #1976d2;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td { border: 1px solid #333; }
        th, td { padding: 10px; text-align: left; }
        th { background-color: #eaeaea; }
        td a { text-decoration: none; color: #1976d2; margin-right: 5px; }
        td a.delete { color: #d32f2f; }

        /* Footer */
        footer {
            grid-area: footer;
            border-top: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span>TRƯỜNG ĐẠI HỌC NHA TRANG</span><br>
            KHOA CÔNG NGHỆ THÔNG TIN
        </div>
        <div class="user-info">
            [<span th:text="${ten ?: 'UserName'}">UserName</span>]
        </div>
    </header>

    <aside>
        <ul>
            <li><a th:href="@{/}">Dasdboard</a></li>
            <li><a th:href="@{/page/all}">Page -List</a></li>
            <li><a th:href="@{/page/new}">Page -Addnew</a></li>
            <li class="active"><a th:href="@{/post/all}">Post -List</a></li>
            <li><a th:href="@{/post/new}">Post -Addnew</a></li>
        </ul>
    </aside>

    <main>
        <div class="content-box">
            <h2>Danh sách các Post</h2>
            
            <a th:href="@{/post/new}" class="btn-add">+ Thêm mới Post</a>
            
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>title</th>
                        <th>categoryId</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${lstPosts}">
                        <td th:text="${p.id}">01</td>
                        <td th:text="${p.title}">Tiêu đề post</td>
                        <td th:text="${p.categoryId}">101</td>
                        <td>
                            <a th:href="@{/post/view/{id}(id=${p.id})}">[view]</a> 
                            <a href="#">[edit]</a> 
                            <a class="delete" th:href="@{/post/delete/{id}(id=${p.id})}" onclick="return confirm('Bạn có chắc chắn muốn xóa bài viết này không?');">[delete]</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        &copy;2025 by <span th:text="${ten ?: 'Student Name'}">Student Name</span> – FIT.NTU
    </footer>

</body>
</html>
