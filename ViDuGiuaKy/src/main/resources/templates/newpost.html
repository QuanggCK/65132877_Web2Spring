<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm mới Post - CV Sinh Viên</title>
    <style>
        /* CSS Khung Layout chung */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar content"
                "footer footer";
            grid-template-rows: 60px 1fr 40px;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        /* Header */
        header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding: 0 20px;
        }
        .logo { color: #d32f2f; font-weight: bold; font-size: 14px; }
        .logo span { color: #1976d2; font-size: 12px; }
        .user-info { font-size: 16px; }

        /* Sidebar */
        aside {
            grid-area: sidebar;
            border-right: 2px solid #333;
        }
        aside ul { list-style-type: none; }
        aside ul li { border-bottom: 1px solid #333; }
        aside ul li a {
            display: block; padding: 12px 15px; font-size: 16px;
            text-decoration: none; color: #333;
        }
        aside ul li a:hover { background-color: #eee; }
        aside ul li.active a { font-weight: bold; }

        /* Content & Form */
        main {
            grid-area: content; background-color: #f5f5f5; padding: 30px;
        }
        .content-box {
            background: white; padding: 30px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px;
            margin: 0 auto; /* Căn giữa form */
        }
        h2 { margin-bottom: 20px; color: #333; text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit;
        }
        .form-group textarea { resize: vertical; }
        
        .btn-submit {
            padding: 10px 20px; background: #28a745; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 16px;
        }
        .btn-submit:hover { background: #218838; }
        .btn-cancel {
            text-decoration: none; color: #d32f2f; margin-left: 15px; font-size: 16px;
        }

        /* Footer */
        footer {
            grid-area: footer; border-top: 2px solid #333; display: flex;
            justify-content: center; align-items: center; font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span>TRƯỜNG ĐẠI HỌC NHA TRANG</span><br>
            KHOA CÔNG NGHỆ THÔNG TIN
        </div>
        <div class="user-info">
            [<span th:text="${ten ?: 'UserName'}">UserName</span>]
        </div>
    </header>

    <aside>
        <ul>
            <li><a th:href="@{/}">Dasdboard</a></li>
            <li><a th:href="@{/page/all}">Page -List</a></li>
            <li><a th:href="@{/page/new}">Page -Addnew</a></li>
            <li><a th:href="@{/post/all}">Post -List</a></li>
            <li class="active"><a th:href="@{/post/new}">Post -Addnew</a></li>
        </ul>
    </aside>

    <main>
        <div class="content-box">
            <h2>THÊM MỚI POST</h2>
            
            <form th:action="@{/post/new}" th:object="${post}" method="post">
                <div class="form-group">
                    <label>Mã bài viết (ID):</label>
                    <input type="text" th:field="*{id}" required placeholder="Ví dụ: P01">
                </div>
                
                <div class="form-group">
                    <label>Tiêu đề (Title):</label>
                    <input type="text" th:field="*{title}" required>
                </div>
                
                <div class="form-group">
                    <label>Nội dung (Content):</label>
                    <textarea th:field="*{content}" rows="5"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Mã chuyên mục (Category ID):</label>
                    <input type="number" th:field="*{categoryId}" placeholder="Ví dụ: 1">
                </div>
                
                <div class="form-group">
                    <label>Tên file ảnh thu nhỏ (Thumbnail Image):</label>
                    <input type="text" th:field="*{thumbnailImage}" placeholder="Ví dụ: image.jpg">
                </div>
                
                <button type="submit" class="btn-submit">Lưu lại</button>
                <a th:href="@{/post/all}" class="btn-cancel">Hủy bỏ</a>
            </form>
        </div>
    </main>

    <footer>
        &copy;2025 by <span th:text="${ten ?: 'Student Name'}">Student Name</span> – FIT.NTU
    </footer>

</body>
</html>
