<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Biên Tập Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0" th:text="${tin.idTin == null ? '📝 Thêm Bài Viết Mới' : '✏️ Cập Nhật Bài Viết'}">Form Title</h4>
                </div>
                <div class="card-body">
                    
                    <form th:action="@{/admin/save}" th:object="${tin}" method="post">
                        
                        <input type="hidden" th:field="*{idTin}" />
                        <input type="hidden" th:field="*{ngayDang}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tiêu đề bài viết <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{title}" required placeholder="Nhập tiêu đề...">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Chuyên mục <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{loaiTinTuc.idLoai}" required>
                                <option value="" disabled selected>-- Chọn chuyên mục --</option>
                                <option th:each="loai : ${danhSachLoai}" 
                                        th:value="${loai.idLoai}" 
                                        th:text="${loai.tenLoai}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Đường dẫn hình ảnh bìa (URL)</label>
                            <input type="url" class="form-control" th:field="*{image}" placeholder="https://example.com/image.jpg">
                            <small class="text-muted">Dán link ảnh vào đây (có thể để trống)</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Nội dung chi tiết</label>
                            <textarea class="form-control" th:field="*{content}" rows="8" placeholder="Nhập nội dung..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-3">
                            <a th:href="@{/admin}" class="btn btn-secondary">Hủy bỏ</a>
                            <button type="submit" class="btn btn-success">💾 Lưu Bài Viết</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
