<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản trị viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa; /* Màu nền xám nhạt cho trang đăng nhập */
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto; /* Căn giữa màn hình */
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-container">
        <div class="card shadow-lg border-0 rounded-lg">
            <div class="card-header text-center bg-primary text-white">
                <h3 class="font-weight-light my-2">Đăng Nhập Admin</h3>
            </div>
            <div class="card-body">
                
                <div th:if="${error}" class="alert alert-danger text-center" role="alert">
                    Tên đăng nhập hoặc mật khẩu không đúng!
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="username" name="username" type="text" placeholder="Nhập tài khoản admin" required />
                        <label for="username">👤 Tên đăng nhập</label>
                    </div>
                    
                    <div class="form-floating mb-4">
                        <input class="form-control" id="password" name="password" type="password" placeholder="Nhập mật khẩu" required />
                        <label for="password">🔑 Mật khẩu</label>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4 mb-0">
                        <button type="submit" class="btn btn-primary btn-lg">Đăng Nhập</button>
                    </div>
                </form>

            </div>
            <div class="card-footer text-center py-3">
                <div class="small"><a href="/" class="text-decoration-none">← Quay lại trang chủ</a></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
