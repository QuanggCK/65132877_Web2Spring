<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title th:text="${tin.title}">Chi tiết tin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <a th:href="@{/}" class="text-decoration-none mb-3 d-inline-block">&larr; Quay lại trang chủ</a>
            
            <h1 class="fw-bold mb-3" th:text="${tin.title}">Tiêu đề bài viết</h1>
            <div class="text-muted mb-4 pb-3 border-bottom">
                Ngày đăng: <span th:text="${tin.ngayDang}" class="fw-bold"></span> 
                --- <span class="badge bg-secondary" th:text="${tin.loaiTinTuc?.tenLoai}"></span>
            </div>

            <div th:if="${tin.image != null and !tin.image.isEmpty()}" class="mb-4 text-center">
                <img th:src="${tin.image}" class="img-fluid rounded" style="max-height: 500px;" alt="Cover">
            </div>

            <div class="fs-5" style="line-height: 1.8;" th:utext="${tin.content}">
                Nội dung 
            </div>
        </div>
    </div>
</div>

</body>
</html>
