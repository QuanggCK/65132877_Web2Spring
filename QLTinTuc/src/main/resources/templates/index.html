<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ - QLTinTuc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">📰 Trang Tin Tức</a>
        <a class="btn btn-outline-light btn-sm" href="/admin">Đăng nhập Admin</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4 border-bottom pb-2">Tin Tức Mới Nhất</h2>
    <div class="row">
        <div class="col-md-4 mb-4" th:each="tin : ${danhSachTin}">
            <div class="card h-100 shadow-sm">
                <img th:src="${tin.image != null and !tin.image.isEmpty() ? tin.image : 'https://via.placeholder.com/400x250?text=No+Image'}" 
                     class="card-img-top" style="height: 200px; object-fit: cover;" alt="Image">
                
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title text-primary" th:text="${tin.title}">Tiêu đề</h5>
                    <p class="card-text text-muted small mb-3">
                        📅 <span th:text="${tin.ngayDang}"></span> | 
                        🏷️ <span th:text="${tin.loaiTinTuc?.tenLoai ?: 'Chưa phân loại'}"></span>
                    </p>
                    <a th:href="@{/tin-tuc/{id}(id=${tin.idTin})}" class="btn btn-primary mt-auto">Đọc tiếp &rarr;</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
