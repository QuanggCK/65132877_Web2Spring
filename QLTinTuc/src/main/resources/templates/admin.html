<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Quản Trị Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🛠️ Bảng Điều Khiển Admin</a>
            <a href="/" class="btn btn-outline-light btn-sm">Đăng xuất</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-success">
            <h4 class="alert-heading">Đăng nhập thành công!</h4>
            <p>Chào mừng bạn đến với trang quản trị. Tại đây bạn có thể Thêm, Sửa, Xóa tin tức.</p>
        </div>
        
        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Quản lý Tin Tức</h5>
                        <p class="card-text">Xem danh sách, thêm sửa xóa bài báo.</p>
                        <a href="#" class="btn btn-primary">Đi tới</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Quản lý Loại Tin</h5>
                        <p class="card-text">Quản lý các chuyên mục Thể thao, Game...</p>
                        <a href="#" class="btn btn-success">Đi tới</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
