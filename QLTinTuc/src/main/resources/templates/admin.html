<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">⚙️ Quản Trị Hệ Thống</a>
            <div class="d-flex">
                <a th:href="@{/}" class="btn btn-outline-light btn-sm">Về trang web người dùng</a>
            </div>
        </div>
    </nav>

    <div class="container bg-white p-4 rounded shadow-sm">
        
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0 text-primary fw-bold">📋 Quản Lý Tin Tức</h3>
            <a th:href="@{/admin/add}" class="btn btn-success fw-bold shadow-sm">
                + Thêm bài viết mới
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th scope="col" style="width: 5%;">ID</th>
                        <th scope="col" style="width: 10%;">Hình ảnh</th>
                        <th scope="col" class="text-start" style="width: 35%;">Tiêu đề</th>
                        <th scope="col" style="width: 15%;">Chuyên mục</th>
                        <th scope="col" style="width: 15%;">Ngày đăng</th>
                        <th scope="col" style="width: 20%;">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tin : ${danhSachTin}">
                        <td class="fw-bold" th:text="${tin.idTin}">1</td>
                        
                        <td>
                            <img th:src="${tin.image != null and !tin.image.isEmpty() ? tin.image : 'https://via.placeholder.com/50?text=No'}" 
                                 alt="Ảnh" style="width: 60px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">
                        </td>
                        
                        <td class="text-start text-truncate" style="max-width: 250px;" th:text="${tin.title}">Tiêu đề bài viết</td>
                        
                        <td>
                            <span class="badge bg-secondary" th:text="${tin.loaiTinTuc?.tenLoai ?: 'Chưa phân loại'}"></span>
                        </td>
                        
                        <td th:text="${tin.ngayDang}">01/01/2026</td>
                        
                        <td>
                            
                            <a th:href="@{/admin/edit/{id}(id=${tin.idTin})}" class="text-dark text-decoration-none me-3">Sửa</a>
                            
                            <a th:href="@{/admin/delete/{id}(id=${tin.idTin})}" class="text-dark text-decoration-none" 
                               onclick="return confirm('Bạn có chắc chắn muốn xóa bài viết này không?');">Xóa</a>
                        </td>
                    </tr>
                    
                    <tr th:if="${#lists.isEmpty(danhSachTin)}">
                        <td colspan="6" class="text-muted fst-italic py-4">Chưa có bài viết nào. Hãy bấm "Thêm bài viết mới" để bắt đầu!</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
